name: PR Auto Label

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply role and FR labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const head = pr.head.ref || "";
            const body = pr.body || "";

            const roleLabels = [
              { name: "role:backend", color: "1D76DB", description: "Backend implementation PR" },
              { name: "role:frontend", color: "5319E7", description: "Frontend implementation PR" },
              { name: "role:fullstack", color: "0E8A16", description: "Fullstack implementation PR" }
            ];

            for (const l of roleLabels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: l.name,
                  color: l.color,
                  description: l.description
                });
              } catch (e) {
                // Ignore if label already exists.
              }
            }

            const labelsToAdd = new Set();

            if (/^(be\/|be-)/.test(head)) labelsToAdd.add("role:backend");
            if (/^(fe\/|fe-)/.test(head)) labelsToAdd.add("role:frontend");
            if (/^(dev\/|development\/)/.test(head)) labelsToAdd.add("role:fullstack");

            const issueNumbers = [...body.matchAll(/#(\d+)/g)].map((m) => Number(m[1]));
            for (const issueNumber of issueNumbers) {
              try {
                const issueLabels = await github.rest.issues.listLabelsOnIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                for (const l of issueLabels.data) {
                  labelsToAdd.add(l.name);
                }
              } catch (e) {
                // Ignore invalid references.
              }
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [...labelsToAdd]
              });
            }
